baseURL = 'https://blog.noobygames.de'
languageCode = 'en-us'
title = 'Tobias Theel | Senior Software Engineer'
DefaultContentLanguage = "en"
Paginate = 10
enableRobotsTXT = true

[services.disqus]
  shortname = "nerzal-blog"


[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  text_color = "#e4f1fe"
  author = "Tobias Theel"
  favicon = ""
  site_logo = ""
  description = "Remote-first Senior Software Engineer specializing in Go, Cloud-Native architecture, and Game Development. 12+ years of experience in distributed environments."
  # choose a background color from any on this page: https://tachyons.io/docs/themes/skins/ and preface it with "bg-"
  background_color_class = "background-dark"
  recent_posts_number = 3
  custom_css = ["styles.css", "timeline.css"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

 
[params.footer]
    enable_menu_footer_primary = true
    footer_primary_menu_title = "Impressum"


[[params.socials]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/tobias-theel-3353a9181"
  follow = true
  share = true
  color = "#0077b5"

[[params.socials]]
  name = "github"
  url = "https://github.com/Nerzal"
  follow = true
  color = "#333"

[[params.socials]]
  name = "bluesky"
  url = "https://bsky.app/profile/nerzal.bsky.social"
  share = true
  follow = true
  color = "#0560ff"


[privacy]
  [privacy.disqus]
    disable = false
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true
